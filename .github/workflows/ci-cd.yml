name: CI/CD — EKS ap-south-1

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:    ap-south-1
  EKS_CLUSTER:   usdc-cop-dev
  K8S_NAMESPACE: payments

jobs:
###############################################################################
# Job 1 — Unit Tests (no AWS needed)
###############################################################################
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: api/test-results.xml

###############################################################################
# Job 2 — Terraform Apply (creates VPC, EKS, ECR FIRST)
###############################################################################
  infra:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      api_ecr_url:  ${{ steps.tf_outputs.outputs.api_ecr_url }}
      mock_ecr_url: ${{ steps.tf_outputs.outputs.mock_ecr_url }}
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false   # needed so outputs work correctly

      - name: Bootstrap state bucket if missing
        run: |
          # Create S3 bucket for tfstate if it doesn't exist yet
          if ! aws s3api head-bucket --bucket usdc-cop-tfstate 2>/dev/null; then
            echo "Creating tfstate S3 bucket..."
            aws s3api create-bucket \
              --bucket usdc-cop-tfstate \
              --region ap-south-1 \
              --create-bucket-configuration LocationConstraint=ap-south-1

            aws s3api put-bucket-versioning \
              --bucket usdc-cop-tfstate \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket usdc-cop-tfstate \
              --server-side-encryption-configuration '{
                "Rules": [{
                  "ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "aws:kms"},
                  "BucketKeyEnabled": true
                }]
              }'

            aws s3api put-public-access-block \
              --bucket usdc-cop-tfstate \
              --public-access-block-configuration \
                "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

            echo "✓ S3 bucket created"
          else
            echo "✓ S3 bucket already exists"
          fi

          # Create DynamoDB lock table if it doesn't exist yet
          TABLE_STATUS=$(aws dynamodb describe-table \
            --table-name usdc-cop-tflock \
            --region ap-south-1 \
            --query "Table.TableStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$TABLE_STATUS" = "NOT_FOUND" ]; then
            echo "Creating DynamoDB lock table..."
            aws dynamodb create-table \
              --table-name usdc-cop-tflock \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ap-south-1

            aws dynamodb wait table-exists \
              --table-name usdc-cop-tflock \
              --region ap-south-1

            echo "✓ DynamoDB table created"
          else
            echo "✓ DynamoDB table already exists"
          fi

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="api_image_tag=sha-${GITHUB_SHA::8}" \
            -var="git_sha=${{ github.sha }}" \
            -var="vendor_a_key=${{ secrets.VENDOR_A_KEY }}" \
            -var="vendor_b_key=${{ secrets.VENDOR_B_KEY }}" \
            -var="grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}"

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: infra/terraform
        run: |
          echo "api_ecr_url=$(terraform output -raw api_ecr_url)"   >> $GITHUB_OUTPUT
          echo "mock_ecr_url=$(terraform output -raw blockchain_ecr_url)" >> $GITHUB_OUTPUT
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT

###############################################################################
# Job 3 — Build and Push images to ECR (ECR now guaranteed to exist)
###############################################################################
  build:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: infra      # ← waits for Terraform to finish first
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push payments-api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ needs.infra.outputs.api_ecr_url }}:${{ steps.tag.outputs.tag }}
            ${{ needs.infra.outputs.api_ecr_url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push blockchain-mock
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.blockchain-mock
          push: true
          tags: |
            ${{ needs.infra.outputs.mock_ecr_url }}:${{ steps.tag.outputs.tag }}
            ${{ needs.infra.outputs.mock_ecr_url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

###############################################################################
# Job 4 — Deploy to EKS
###############################################################################
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [infra, build]   # ← waits for BOTH infra and build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ needs.infra.outputs.cluster_name }}

      - name: Update image tags in cluster
        run: |
          kubectl set image deployment/payments-api \
            payments-api=${{ needs.infra.outputs.api_ecr_url }}:${{ needs.build.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

          kubectl set image deployment/blockchain-mock \
            blockchain-mock=${{ needs.infra.outputs.mock_ecr_url }}:${{ needs.build.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/payments-api    -n ${{ env.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/blockchain-mock -n ${{ env.K8S_NAMESPACE }} --timeout=60s

      - name: Get ALB hostname
        id: alb
        run: |
          for i in {1..20}; do
            LB=$(kubectl get svc payments-api -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$LB" ]; then
              echo "lb_host=$LB" >> $GITHUB_OUTPUT
              echo "ALB ready: $LB"
              break
            fi
            echo "Waiting for ALB... ($i/20)"
            sleep 15
          done

      - name: Run smoke tests
        env:
          API_BASE_URL: http://${{ steps.alb.outputs.lb_host }}
        run: bash scripts/smoke-test.sh

      - name: DORA — record successful deploy
        if: success()
        run: |
          echo "::notice title=Deployed::sha-${GITHUB_SHA::8} to production at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: DORA — record failed deploy
        if: failure()
        run: |
          echo "::warning title=Deploy Failed::sha-${GITHUB_SHA::8} — increment change failure rate"

###############################################################################
# Job 5 — Terraform Plan only (on pull requests)
###############################################################################
  terraform_plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan -no-color \
            -var="api_image_tag=sha-${GITHUB_SHA::8}" \
            -var="git_sha=${{ github.sha }}" \
            -var="vendor_a_key=${{ secrets.VENDOR_A_KEY }}" \
            -var="vendor_b_key=${{ secrets.VENDOR_B_KEY }}" \
            -var="grafana_admin_password=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
          | tee plan.txt

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/plan.txt', 'utf8');
            const body = plan.length > 60000 ? plan.slice(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${body}\n\`\`\``
            });