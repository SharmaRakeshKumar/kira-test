global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "payments-api"
    static_configs:
      - targets: ["payments-api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "blockchain-mock"
    static_configs:
      - targets: ["blockchain-mock:8001"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
